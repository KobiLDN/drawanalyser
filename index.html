<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw Probability Analyzer v2</title>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1a1a1a;
  --border: #242424;
  --border2: #303030;
  --text: #e2e2e2;
  --text2: #888;
  --text3: #444;
  --gold: #c8a84b;
  --gold-dim: #7a6228;
  --green: #4a9e6a;
  --amber: #c9792a;
  --red: #c94a4a;
  --blue: #4a7ec9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); }
.logo span { color: var(--text3); font-weight: 400; margin-left: 10px; letter-spacing: 0.05em; }
.depth-badge { font-size: 10px; padding: 3px 10px; border: 1px solid var(--gold-dim); border-radius: 3px; color: var(--gold); letter-spacing: 0.1em; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.updated-tag { font-size: 10px; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; }
.toggle-pill { font-size: 9px; padding: 2px 7px; border-radius: 99px; border: 1px solid var(--border2); color: var(--text3); letter-spacing: 0.08em; }
.toggle-pill.on { color: var(--gold); border-color: var(--gold-dim); background: rgba(200, 168, 75, 0.08); }

.layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 49px); }
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 49px;
  height: calc(100vh - 49px);
  overflow-y: auto;
}
.sidebar-section { margin-bottom: 6px; }
.sidebar-group-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 10px 20px 6px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 20px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  border-left: 2px solid transparent;
}
.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active { background: var(--surface2); color: var(--gold); border-left-color: var(--gold); }
.sidebar-badge {
  font-size: 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 1px 6px;
  color: var(--text3);
}

.main { padding: 28px 32px; }
.league-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.league-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
.league-name { font-size: 22px; font-weight: 700; }
.league-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.league-stats { display: flex; gap: 24px; text-align: right; }
.stat-val { font-size: 22px; font-weight: 700; color: var(--gold); }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

.day-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
  margin-top: 22px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.day-label:first-child { margin-top: 0; }

.fixture {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  margin-bottom: 7px;
  cursor: pointer;
  overflow: hidden;
}
.fixture:hover { border-color: var(--border2); }
.fixture.open { border-color: var(--gold-dim); }

.fixture-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 16px;
  padding: 13px 16px;
}
.teams { font-size: 14px; font-weight: 600; }
.kick-time { font-size: 11px; color: var(--text2); margin-top: 3px; }
.pct-display { font-size: 20px; font-weight: 700; min-width: 48px; text-align: right; }
.mini-bar-wrap { width: 70px; height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; }
.mini-bar { height: 100%; }
.vtag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 3px;
  min-width: 68px;
  text-align: center;
}
.v-low    { color: var(--text3); background: #181818; border: 1px solid #282828; }
.v-mod    { color: var(--amber); background: #1c1200; border: 1px solid #3a2800; }
.v-good   { color: var(--green); background: #001508; border: 1px solid #002a10; }
.v-strong { color: var(--blue);  background: #000e1c; border: 1px solid #001c38; }
.bar-low    { background: var(--text3); }
.bar-mod    { background: var(--amber); }
.bar-good   { background: var(--green); }
.bar-strong { background: var(--blue);  }
.chevron { font-size: 11px; color: var(--text3); margin-left: 2px; }
.fixture.open .chevron { transform: rotate(180deg); }

.analysis {
  display: none;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  padding: 18px 16px;
}
.fixture.open .analysis { display: block; }

.deep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.deep-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
}
.deep-label {
  font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.deep-label::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
.deep-content { font-size: 12px; color: var(--text); line-height: 1.6; }
.deep-content ul { list-style: none; padding: 0; }
.deep-content li {
  font-size: 11px; color: var(--text2); padding: 3px 0;
  padding-left: 10px; position: relative;
}
.deep-content li::before {
  content: '•'; color: var(--text3);
  position: absolute; left: 0;
}
.deep-content .out { color: var(--red); font-weight: 500; }
.deep-content .doubt { color: var(--amber); font-weight: 500; }
.deep-content .key { color: var(--gold); font-weight: 500; }

.factors-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
.factor {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 11px;
}
.fn { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.fbar-wrap { height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
.fbar { height: 100%; background: var(--gold); }
.fnum { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.fdetail { font-size: 10px; color: var(--text2); line-height: 1.5; }

.summary-grid { display: grid; grid-template-columns: 1fr 140px; gap: 16px; align-items: start; }
.summary-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
.odds-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 12px; text-align: center;
}
.odds-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.odds-val { font-size: 17px; font-weight: 700; color: var(--gold); }
.odds-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

.research-tag {
  display: inline-block; font-size: 9px; padding: 2px 6px;
  background: rgba(74, 126, 201, 0.1); border: 1px solid rgba(74, 126, 201, 0.3);
  color: var(--blue); border-radius: 3px; letter-spacing: 0.05em;
  margin-left: 8px; vertical-align: middle;
}
.result-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; margin-left: 8px; vertical-align: middle; }
.league-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; margin-left: 6px; vertical-align: middle; background: #1a1a2e; color: #6a8fc8; border: 1px solid #2a3a5a; letter-spacing: 0.04em; }
.value-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; margin-left: 6px; vertical-align: middle; background: #001a08; color: var(--green); border: 1px solid #003018; letter-spacing: 0.08em; animation: pulse-value 2s ease-in-out infinite; }
@keyframes pulse-value { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
.book-row { display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.book-cell { flex: 1; }
.book-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
.book-num { font-size: 16px; font-weight: 700; }
.edge-pos { color: var(--green); }
.edge-neg { color: var(--red); }
.edge-nil { color: var(--text3); }
.result-draw  { background: #1e1a00; color: var(--gold);  border: 1px solid var(--gold-dim); }
.result-home  { background: #001a08; color: var(--green); border: 1px solid #003018; }
.result-away  { background: #1a0000; color: var(--red);   border: 1px solid #3a0000; }

@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; display: flex; flex-wrap: wrap; gap: 4px; padding: 12px; border-right: none; border-bottom: 1px solid var(--border); }
  .sidebar-group-label { display: none; }
  .sidebar-item { border-left: none; border-radius: 4px; border: 1px solid var(--border); padding: 7px 12px; font-size: 12px; }
  .factors-row { grid-template-columns: repeat(2, 1fr); }
  .deep-grid { grid-template-columns: 1fr; }
  .fixture-row { grid-template-columns: 1fr auto auto; }
  .mini-bar-wrap { display: none; }
  .summary-grid { grid-template-columns: 1fr; }
}
</style>
</head>

let activeId = 'all';
let showPast = false;

function verdictClass(v) {
  return { Low: 'v-low', Moderate: 'v-mod', Good: 'v-good', Strong: 'v-strong' }[v] || 'v-low';
}
function barClass(v) {
  return { Low: 'bar-low', Moderate: 'bar-mod', Good: 'bar-good', Strong: 'bar-strong' }[v] || 'bar-low';
}
const MONTHS = {January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
function dayToTs(dayStr) {
  const p = dayStr.split(' '); // ["Thursday", "7", "May"]
  return new Date(2026, MONTHS[p[2]], parseInt(p[1])).getTime();
}
const todayTs = new Date(new Date().setHours(0,0,0,0)).getTime();

function parseFairMid(str) {
  if (!str) return null;
  const parts = str.split('–').map(s => parseFloat(s.trim()));
  if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
  return (parts[0] + parts[1]) / 2;
}
function calcEdge(fairOddsStr, bookOdds) {
  const mid = parseFairMid(fairOddsStr);
  if (!mid || !bookOdds) return null;
  return ((bookOdds / mid) - 1) * 100;
}

function renderSidebar() {
  const groups = [
    { label: 'Domestic Leagues', ids: ['pl','laliga','seriea','bundesliga','ligue1'] },
    { label: 'European',         ids: ['ucl','uel','uecl'] }
  ];
  const totalUpcoming = LEAGUES.reduce((n, l) => n + l.fixtures.filter(f => !f.result).length, 0);
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-item ${activeId === 'all' ? 'active' : ''}" onclick="setLeague('all')" style="font-weight:600;">
        <span>All Fixtures</span>
        <span class="sidebar-badge">${totalUpcoming}</span>
      </div>
    </div>` +
  groups.map(g => {
    const items = LEAGUES.filter(l => g.ids.includes(l.id));
    if (!items.length) return '';
    return `
      <div class="sidebar-section">
        <div class="sidebar-group-label">${g.label}</div>
        ${items.map(l => `
          <div class="sidebar-item ${l.id === activeId ? 'active' : ''}" onclick="setLeague('${l.id}')">
            <span>${l.name}</span>
            <span class="sidebar-badge">${l.fixtures.length}</span>
          </div>
        `).join('')}
      </div>`;
  }).join('') + `
    <div class="sidebar-section">
      <div class="sidebar-group-label">Display</div>
      <div class="sidebar-item" onclick="togglePast()">
        <span>Past fixtures</span>
        <span class="toggle-pill ${showPast ? 'on' : ''}">${showPast ? 'ON' : 'OFF'}</span>
      </div>
    </div>`;
}

function renderTeamNews(items) {
  if (!items || !items.length) return '<div class="deep-content"><em style="color:var(--text3);">No notable issues</em></div>';
  return `<ul class="deep-content">${items.map(i => `
    <li><span class="${i.tag}">${i.tag === 'out' ? '❌' : i.tag === 'doubt' ? '⚠' : '★'}</span> ${i.text}</li>
  `).join('')}</ul>`;
}

  // Collect all fixtures with league info attached
  const allFixtures = [];
  LEAGUES.forEach(league => {
    league.fixtures.forEach(f => {
      allFixtures.push(Object.assign({}, f, { _leagueName: league.name, _leagueId: league.id }));
    });
  });

  // Filter to today and forward (or include past if toggled), then sort
  const filtered = showPast ? allFixtures.slice() : allFixtures.filter(f => dayToTs(f.day) >= todayTs);
  filtered.sort((a, b) => {
    const dd = dayToTs(a.day) - dayToTs(b.day);
    if (dd !== 0) return dd;
    return a.time.localeCompare(b.time);
  });

  // Group by day
  const grouped = {};
  filtered.forEach(f => { if (!grouped[f.day]) grouped[f.day] = []; grouped[f.day].push(f); });

  const upcoming    = filtered.filter(f => !f.result).length;
  const topPick     = filtered.length ? Math.max(...filtered.map(f => f.drawProbability)) : 0;
  const strongPicks = filtered.filter(f => f.verdict === 'Strong' || f.verdict === 'Good').length;

  document.getElementById('main').innerHTML = `
    <div class="league-header">
      <div>
        <div class="league-title">All Competitions</div>
        <div class="league-name">This Weekend</div>
        <div class="league-sub">PL · La Liga · Serie A · Bundesliga · Ligue 1 · UCL · UEL · UECL</div>
      </div>
      <div class="league-stats">
        <div><div class="stat-val">${upcoming}</div><div class="stat-label">Upcoming</div></div>
        <div><div class="stat-val">${strongPicks}</div><div class="stat-label">Good/Strong picks</div></div>
        <div><div class="stat-val">${topPick}%</div><div class="stat-label">Top pick</div></div>
      </div>
    </div>
    ${Object.keys(grouped).length ? Object.entries(grouped).map(([day, fixtures]) => `
      <div class="day-label">${day}</div>
      ${fixtures.map((f, idx) => renderFixture(f, day + idx, f._leagueName)).join('')}
    `).join('') : '<div class="no-fixtures">No upcoming fixtures — check back when the next gameweek is loaded.</div>'}
  `;
}

function renderMain() {
  if (activeId === 'all') { renderAll(); return; }
  const league = LEAGUES.find(l => l.id === activeId);
  if (!league) return;

  const filtered = showPast ? league.fixtures.slice() : league.fixtures.filter(f => dayToTs(f.day) >= todayTs);

  const grouped = {};
  filtered.forEach(f => {
    if (!grouped[f.day]) grouped[f.day] = [];
    grouped[f.day].push(f);
  });

  const upcoming    = filtered.filter(f => !f.result).length;
  const topPick     = filtered.length ? Math.max(...filtered.map(f => f.drawProbability)) : 0;
  const strongPicks = filtered.filter(f => f.verdict === 'Strong' || f.verdict === 'Good').length;

  document.getElementById('main').innerHTML = `
    <div class="league-header">
      <div>
        <div class="league-title">${league.country}</div>
        <div class="league-name">${league.name}</div>
        <div class="league-sub">${league.round} · Deep research updated 5 May 2026</div>
      </div>
      <div class="league-stats">
        <div><div class="stat-val">${league.drawRate}%</div><div class="stat-label">League draw rate</div></div>
        <div><div class="stat-val">${strongPicks}</div><div class="stat-label">Strong/Good picks</div></div>
        <div><div class="stat-val">${topPick}%</div><div class="stat-label">Top pick</div></div>
      </div>
    </div>
    ${Object.keys(grouped).length ? Object.entries(grouped).map(([day, fixtures]) => `
      <div class="day-label">${day}</div>
      ${fixtures.map((f, idx) => renderFixture(f, day + idx)).join('')}
    `).join('') : '<div class="no-fixtures">No upcoming fixtures — check back when the next gameweek is loaded.</div>'}
  `;
}

function renderFixture(f, key, leagueName) {
  const vc = verdictClass(f.verdict);
  const bc = barClass(f.verdict);
  const factorNames = {
    formBalance: 'Form balance', drawRates: 'Draw rates',
    headToHead: 'Head to head', goalTendency: 'Goal tendency', leagueContext: 'Context'
  };
  const factorsHTML = Object.entries(f.factors).map(([k, v]) => `
    <div class="factor">
      <div class="fn">${factorNames[k] || k}</div>
      <div class="fbar-wrap"><div class="fbar" style="width:${v.score}%"></div></div>
      <div class="fnum">${v.score}</div>
      <div class="fdetail">${v.detail}</div>
    </div>
  `).join('');

  const teamNewsBlock = f.teamNews ? `
    <div class="deep-grid">
      <div class="deep-card">
        <div class="deep-label">${f.home} — Team News</div>
        ${renderTeamNews(f.teamNews.home)}
      </div>
      <div class="deep-card">
        <div class="deep-label">${f.away} — Team News</div>
        ${renderTeamNews(f.teamNews.away)}
      </div>
    </div>
    ${f.context ? `<div class="deep-card" style="margin-bottom:16px;">
      <div class="deep-label">Context & Tactical Read</div>
      <div class="deep-content" style="font-size:12px;line-height:1.7;">${f.context}</div>
    </div>` : ''}
  ` : '';

  const resultBadge = f.result ? `<span class="result-badge result-${f.result}">${f.result === 'draw' ? 'DRAW' : f.result === 'home' ? 'HOME' : 'AWAY'}</span>` : '';
  const researchBadge = f.teamNews ? '<span class="research-tag">RESEARCHED</span>' : '';
  const leagueTag = leagueName ? `<span class="league-tag">${leagueName}</span>` : '';
  const edge = calcEdge(f.fairOdds, f.bookOdds);
  const valueBadge = (f.bookOdds && edge !== null && edge >= 5) ? `<span class="value-badge">VALUE ${f.bookOdds.toFixed(2)}</span>` : (f.bookOdds && edge !== null && edge > 0) ? `<span class="value-badge" style="opacity:0.7;">EDGE ${f.bookOdds.toFixed(2)}</span>` : '';

  return `
    <div class="fixture" id="fix-${key}" onclick="toggleFixture('fix-${key}')">
      <div class="fixture-row">
        <div>
          <div class="teams">${f.home} vs ${f.away} ${resultBadge}${researchBadge}${leagueTag}${valueBadge}</div>
          <div class="kick-time">${f.time} kick-off</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="pct-display" style="color:${f.verdict==='Strong'?'var(--blue)':f.verdict==='Good'?'var(--green)':f.verdict==='Moderate'?'var(--amber)':'var(--text3)'}">${f.drawProbability}%</div>
          <div class="mini-bar-wrap"><div class="mini-bar ${bc}" style="width:${f.drawProbability}%"></div></div>
        </div>
        <div class="vtag ${vc}">${f.verdict}</div>
        <div class="chevron">▼</div>
      </div>
      <div class="analysis">
        ${teamNewsBlock}
        <div class="factors-row">${factorsHTML}</div>
        <div class="summary-grid">
          <div class="summary-text">${f.summary}</div>
          <div class="odds-box">
            <div class="odds-lbl">Fair draw odds</div>
            <div class="odds-val">${f.fairOdds}</div>
            <div class="odds-sub">researched range</div>
            ${f.bookOdds && edge !== null ? `
            <div class="book-row">
              <div class="book-cell">
                <div class="book-lbl">Book price</div>
                <div class="book-num ${edge >= 5 ? 'edge-pos' : edge > 0 ? 'edge-pos' : 'edge-neg'}">${f.bookOdds.toFixed(2)}</div>
              </div>
              <div class="book-cell" style="text-align:right">
                <div class="book-lbl">Edge</div>
                <div class="book-num ${edge >= 5 ? 'edge-pos' : edge > 0 ? 'edge-pos' : 'edge-neg'}">${edge >= 0 ? '+' : ''}${edge.toFixed(1)}%</div>
              </div>
            </div>` : `<div class="odds-sub" style="margin-top:6px;font-style:italic;">Add bookOdds to fixture</div>`}
          </div>
        </div>
      </div>
    </div>`;
}

function toggleFixture(id) {
  document.getElementById(id).classList.toggle('open');
}

function setLeague(id) {
  activeId = id;
  renderSidebar();
  renderMain();
}

function togglePast() {
  showPast = !showPast;
  renderSidebar();
  renderMain();
}

renderSidebar();
renderMain();
</script>

</body>
</html>

name: Verify fixtures

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'scripts/verify-fixtures.js'
      - '.github/workflows/verify-fixtures.yml'
  schedule:
    # Daily at 07:00 UTC — catches fixture changes ahead of the weekend
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run verification
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/verify-fixtures.js

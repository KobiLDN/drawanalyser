name: Auto-mark results

on:
  schedule:
    # Daily at 23:30 UTC — after late kick-offs across European time zones
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mark:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Mark finished results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/mark-results.js
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git add index.html FEATURES.md
          git commit -m "auto-mark: results"
          git push

name: Auto-fetch fixtures

on:
  schedule:
    # Every Monday at 08:00 UTC — picks up the following week's schedule
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      days_ahead:
        description: 'How many days ahead to fetch (default: 8)'
        required: false
        default: '8'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Fetch upcoming fixtures
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          DAYS_AHEAD: ${{ github.event.inputs.days_ahead || '8' }}
        run: node scripts/fetch-fixtures.js
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git add index.html FEATURES.md
          git commit -m "auto-fetch: upcoming fixture stubs"
          git push
